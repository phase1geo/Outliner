app-id: io.github.phase1geo.outliner
runtime: io.elementary.Platform
runtime-version: '8.2'
sdk: io.elementary.Sdk
command: io.github.phase1geo.outliner

finish-args:
  - '--share=ipc'
  - '--socket=fallback-x11'
  - '--socket=wayland'
  - '--filesystem=home'

modules:
  - name: libmarkdown
    buildsystem: simple
    build-commands:
      - ./configure.sh --shared --prefix=/app --pkg-config
      - make -j${FLATPAK_BUILDER_N_JOBS}
      - sed -e 's|/sbin/ldconfig|/sbin/ldconfig -n|' -i librarian.sh
      - make install
    sources:
      - type: archive
        url: https://github.com/Orc/discount/archive/refs/tags/v2.2.4.tar.gz
        sha256: 918905377e6ed3d0a7158cac0a4a18ed3c4cc0cad8ee95dddd82cb86ba9dd044

  - name: pandoc
    sources:
      - type: archive
        archive-type: tar-gzip
        url: https://github.com/jgm/pandoc/releases/download/3.1.3/pandoc-3.1.3-linux-amd64.tar.gz
        sha256: 74bc434908e4d858b3edbfd6271d2e9e499477837e5df1d630df4e62f113803d
    buildsystem: simple
    build-commands:
      - pwd
    post-install:
      - install -m 755 bin/pandoc /app/bin/pandoc

  - name: Outliner
    buildsystem: meson
    sources:
      - type: dir
        path: ..
